# Butterfly Theme Config
# Documentation: https://butterfly.js.org/

# Site
favicon: /favicon.ico

# Menu
menu:
  Home: /
  Archives: /archives/
  Categories: /categories/
  Tags: /tags/
  About: /about/

# Sidebar
sidebar:
  enable: true
  position: right
  display: post

# Social Links
social:
  GitHub: https://github.com/ || github
  Twitter: https://twitter.com/ || twitter
  Email: mailto:your@email.com || envelope

# Comment
giscus:
  enable: false
  repo: # your github repo
  repo_id: # your repo id
  category: # your category
  category_id: # your category id

# Analytics
google_analytics:
  enable: false
  id: # your google analytics id

# Search
local_search:
  enable: true

# Code Highlight
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
