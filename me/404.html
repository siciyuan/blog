<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 页面未找到</title>
    <meta name="description" content="页面未找到，请检查您的链接" />
    
    <!-- 内联关键CSS -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: '悠哉字体', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #1a1a2e;
        color: white;
        text-align: center;
        padding: 20px;
      }
      
      @font-face {
        font-family: '悠哉字体';
        src: url('/悠哉字体-Medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      
      .error-code {
        font-size: 120px;
        font-weight: bold;
        margin-bottom: 20px;
        background: linear-gradient(45deg, #4CAF50, #2196F3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .error-title {
        font-size: 32px;
        margin-bottom: 20px;
      }
      
      .error-description {
        font-size: 18px;
        margin-bottom: 40px;
        color: rgba(255, 255, 255, 0.8);
      }
      
      .back-home {
        display: inline-block;
        padding: 12px 24px;
        background: rgba(76, 175, 80, 0.7);
        color: white;
        text-decoration: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: 500;
        transition: all 0.3s ease;
        border: 1px solid rgba(76, 175, 80, 0.5);
      }
      
      .back-home:hover {
        background: rgba(76, 175, 80, 0.9);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
      }
      
      .footer {
        margin-top: 60px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
      }
      
      @media (max-width: 768px) {
        .error-code {
          font-size: 80px;
        }
        
        .error-title {
          font-size: 24px;
        }
        
        .error-description {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="error-title">页面未找到</h1>
      <p class="error-description">
        抱歉，您访问的页面不存在或已被删除。<br>
        请检查您输入的网址是否正确，或返回首页。
      </p>
      <a href="/" class="back-home">返回首页</a>
    </div>
    <div class="footer">
      © 2026 鳞游の小窝 | <a href="/" style="color: rgba(255, 255, 255, 0.6); text-decoration: none;">返回首页</a>
    </div>
  </body>
</html>
